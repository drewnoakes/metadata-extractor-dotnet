name: release
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    if: "!github.event.release.prerelease"
    permissions:
      id-token: write
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
    - run: dotnet pack MetadataExtractor/MetadataExtractor.csproj -o . -c Release /p:Version=${{ steps.get_version.outputs.VERSION }} /p:ContinuousIntegrationBuild=true
    - run: dotnet nuget push "*.nupkg" --source https://api.nuget.org/v3/index.json
